ai_usage_summary: |
  Used Gemini for design planning, implementation planning, and code scaffolding.
  Used Cursor to manage task checklists and refactor files.
  No candidate data was transmitted to any external API during candidate ranking.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid Dense Retrieval + Heuristic Ranker. We run a high-recall pre-filter to narrow the candidate pool, then build a pre-computed vector index using all-MiniLM-L6-v2. During the ranking stage, we compute the cosine similarity between candidate profiles and the JD embedding vector in numpy (takes <0.5s for 100K candidates). We combine this with heuristic scoring for YoE, location matching, consulting company exclusions, and Redrob signals. Honeypots are filtered out automatically using a multi-point timeline anomaly check.

